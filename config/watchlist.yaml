# SMC-LSS daily-loop watchlist & automation policy
# Read by src/daily_runner.py and by docs/daily-loop-runbook.md.
strategy_spec: specs/v1.yaml             # execution-track spec (ADR-0001) — sole execution authority
research_spec: specs/v3.6.yaml           # research-track spec (source strategy under approval workflow)

governance:
  schema_version: 1
  config_version: 3.6.0
  registry_version: 3.6.0
  approval_package_required: true
  fail_closed: true

autonomy:
  demo: proposal_only                   # ADR-0001 / WO-2: proposal-only until Phase 3 gates pass (was auto_on_engine_ready)
  live: disabled                        # explicitly disabled — no live automation until promotion gates pass (was auto_on_promotion)
  engine_implements_spec: false         # false => propose-mode; kept per WO-2 fail-closed constraint (see daily_runner.py's .get() default)
  promote_to_live: false

risk:
  risk_pct_demo: 0.5
  risk_pct_live: 1.0
  position_amount_mode: risk_pct        # risk_pct | fixed_lot | fixed_notional
  fixed_lot_demo: 0.01
  fixed_lot_live: 0.01
  fixed_notional_demo: 0.0
  fixed_notional_live: 0.0
  daily_loss_pct: 3.0
  max_positions: 3
  portfolio_heat_pct: 4.0
  min_rr: 2.0

execution:                               # v1 legacy live-path knobs (Phase 3 M1 — externalized, values unchanged)
  equilibrium_window: 40                 # bars used for premium/discount midpoint (was hardcoded in live_signal.py)
  liquidity_sweep_lookback_bars: 10      # recent-bars window for aligned sweep detection (was hardcoded in smc_master.py)
  breakeven_at_r: 1.0                    # R multiple that triggers move-to-BE + partial (was hardcoded in trade_manager.py)
  lot_step: 0.01                         # broker lot rounding step (was hardcoded in live_signal.py)
  killzones:                             # trading-session hour windows, UTC (was hardcoded in smc_master.session_of)
    london: {start_hour: 7, end_hour: 10}
    ny: {start_hour: 12, end_hour: 15}

reporting:
  telegram:
    enabled: false                      # target-state integration; wire token/chat_id outside repo
    bot_token_env: TELEGRAM_BOT_TOKEN
    chat_id_env: TELEGRAM_CHAT_ID
    events: [scan_summary, decision, fill, modify, close, reject, risk_stop, daily_summary]

cadence:                                # derived from strategy session windows (UTC)
  runs_utc: ["07:00", "12:00"]          # London + New York; 13:30 + 18:30 Asia/Yangon
  weekdays_only: true
  timeframes: {etrigger: H1, context: D1, confirm: M5}

# Sizing needs per-symbol point/pip value. These are FALLBACKS; the runbook pulls
# live tick_value via the MetaTrader MCP and prefers it over these.
symbols:
  active:
    - {name: EURUSD, mt5: EURUSD, pip: 0.0001, pip_value_per_lot: 10.0, variants: [E1M3, E3M3]}
    - {name: XAUUSD, mt5: XAUUSD-VIP, pip: 0.1, pip_value_per_lot: 10.0, variants: [E1M1]}
    # BTCUSD confirmed active (demo). Crypto: subscribe in Market Watch for live ticks;
    # candles work regardless. ALWAYS pull live tick value for sizing.
    - {name: BTCUSD, mt5: BTCUSD, pip: 1.0, pip_value_per_lot: 1.0, variants: [E2M3]}
  pending:                              # enable after explicit owner confirmation
    - {name: GBPUSD, mt5: GBPUSD, pip: 0.0001, pip_value_per_lot: 10.0, variants: [E2M1, E3M1]}
