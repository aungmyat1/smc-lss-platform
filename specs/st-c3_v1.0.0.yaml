# ST-C3 "Next-Generation SMC Funnel" — frozen candidate spec.
#
# THIS FILE IS A FROZEN SPECIFICATION RECORD. It is not implementation
# authorization and does not grant execution, demo, live, or broker authority.
# See:
#   - docs/adr/ADR-0004-st-c3-candidate-intake.md (intake decision)
#   - reports/research_log.md, "ST-C3 v1.0.0 candidate intake" entry (RCR)
#   - docs/reference/smc-definitive-guide-dailypriceaction.md
#   - docs/reference/smc-8step-entry-model-dailypriceaction.md
#
# Fields below are one of:
#   `# owner:`      — stated directly by the owner in the intake prompt/session.
#   `# reference:`  — a specific number given in the two source reference docs
#                     (docs/reference/*), carried here as a PROVISIONAL starting
#                     point, not a decision. Must still be ratified or changed
#                     at ST-C3's own S1-G1 spec-freeze act.
#   `UNRESOLVED`    — no owner value and no reference-doc value exists; must be
#                     resolved at S1-G1 before this file may leave draft status.
# Nothing here is inferred or invented beyond what one of those three
# provenance markers documents.
#
# STATUS: FROZEN. Does not supersede, mutate, or pause
# specs/st-c2_v1.2.0.yaml (frozen).

id: ST-C3
name: Next-Generation SMC Funnel
version: 1.0.0
governance_profile: null   # UNRESOLVED — symbol/session scope not yet decided; set at S1-G1
status: frozen   # S1-G1 freeze act recorded in docs/strategy/st_c3/ST-C3_FREEZE_ACTION_LOG.md
consolidation_status: S1_G1_FROZEN_READY_FOR_VALIDATION
engine_implements_spec: false   # SAFETY INTERLOCK — no engine exists
implementation_authorization: null   # freeze does not authorize implementation
supersedes: null   # new lineage; does not supersede or revise ST-C2 (ADR-0004)
freeze:
  timestamp: "2026-07-24T23:50:00 MMT"
  owner: Aung
  governance_agent: Strategy Governance Layer (SGL)
  action_log: docs/strategy/st_c3/ST-C3_FREEZE_ACTION_LOG.md
  validation_status: ready_for_validation
description: >
  Refined deterministic SMC funnel intended to improve ST-C2 by hardening edge
  cases around time, session, volatility, structural locking, sweep reclaim,
  BOS extreme locking, entry expiry, and post-signal termination while keeping
  full SMC alignment. Distinct lineage from ST-C2; own rejection-code and
  funnel-stage-cluster namespace (ADR-0004) to avoid audit-trail collision.

# ============================================================
# 0. Architecture (descriptive metadata only — no rule content)
# ============================================================
architecture:
  core_paradigm: next_generation_smc_funnel_refined_deterministic_model
  execution_mode: multi_timeframe_rule_based_machine_executable
  goal: improve_st_c2_edge_case_hardening_without_mutating_st_c2
  primary_components:
    - htf_bias_engine          # pipeline.htf_bias_stage
    - funnel_state_machine      # pipeline (all stages) + rejection_codes
    - evidence_layer            # evidence_ids across all stages, see reports/ST-C3_FUNNEL_OVERHAUL_PLAN.md §13
    - trade_plan_generator      # trade_plan_schema
    - risk_sl_tp_module         # pipeline.stop_loss_stage, pipeline.targets_stage, risk
    - validator_rejection_system   # conformance, diagnostics, rejection_codes
  # Stage B components (execution/journal agents that place or log live/demo
  # trades) are explicitly OUT OF SCOPE for this Stage A spec. See
  # reports/ST-C3_FUNNEL_OVERHAUL_PLAN.md §10 for the proposed roster and
  # the Stage A/B boundary each proposed component must respect.

# ============================================================
# 1. Instruments & Sessions — UNRESOLVED
# ============================================================
instruments: []   # UNRESOLVED — owner did not specify symbol scope for ST-C3;
                   # no instrument may be enabled before an explicit RCR addendum

sessions:
  london_window_utc: PROVISIONAL_07_00_TO_10_00   # owner example; ratify at S1-G1
  ny_window_utc: PROVISIONAL_13_00_TO_16_00       # owner example; ratify at S1-G1
  low_liquidity_filters: UNRESOLVED              # owner: optional late Asian / pre-close filters

parameters:
  N_SWEEP:
    value: PROVISIONAL_1_TO_3
    unit: bars_on_sweep_timeframe
    status: provisional
  MAX_ENTRY_BARS:
    value: PROVISIONAL_3_TO_5
    unit: M3_bars
    status: provisional
  OTE_MIN:
    value: 0.62
    status: provisional
  OTE_MAX:
    value: 0.79
    status: provisional
  SESSION_LONDON:
    value: "07:00-10:00 UTC"
    status: provisional
  SESSION_NY:
    value: "13:00-16:00 UTC"
    status: provisional
  MIN_RR:
    value: CONFIGURABLE_PROVISIONAL_3R
    status: provisional

# ============================================================
# 2. Timeframes — owner: matches the funnel prompt's stage-by-stage timeframe
#    references (H4 bias, M15 sweep/displacement/BOS/OTE/FVG/OB, M3/M1 LTF
#    confirmation)
# ============================================================
timeframes:
  htf: H4      # owner: "HTF Bias (H4)"
  mf: M15      # owner: "Displacement + BOS (M15)", "Dealing Range + OTE (M15)"
  ltf: [M3, M1]      # owner: "M3/M1 -> CHoCH/BOS confirmation"

# ============================================================
# 3. Funnel Pipeline Stages
# ============================================================
pipeline:

  # ------------------------------------------------------------
  # 3.0 HTF Bias Stage (F1 cluster: 1D FVG/OB reaction, per ADR-0004 relabel)
  # ------------------------------------------------------------
  htf_bias_stage:
    structure_source: hh_hl_lh_ll   # owner: "Identify HH/HL or LH/LL structure on H4"
    bias_lock_policy: locked_until_valid_htf_choch   # owner: "Bias remains locked until a valid HTF CHoCH"
    no_trade_against_bias: true   # owner: "No trades allowed against HTF bias"
    evidence_ids: [HTF_BIAS_ID, HTF_SWING_ID]
    rejection_code: ST-C3-R1   # owner meaning: HTF bias unclear — distinct from ST-C2's bare R1 (ADR-0004)

  # ------------------------------------------------------------
  # 3.1 External Liquidity Sweep Stage
  # ------------------------------------------------------------
  liquidity_sweep_stage:
    sweep_definition:
      breaks_buy_or_sell_side_liquidity: true   # owner
      wick_penetration_required: true            # owner: "wick through the level"
      close_back_inside_range_required: true      # owner: "close back inside the range"
    wick_ratio_min: UNRESOLVED   # no owner number given; ST-C2 uses 0.6 but that is ST-C2's own
                                  # decided value, not carried over per ADR-0004 (new lineage)
    equal_highs_lows_tolerance: UNRESOLVED
    max_sweep_age_bars: UNRESOLVED
    sweep_wick_penetration: true
    sweep_close_reclaim: required
    sweep_reclaim_max_bars: PROVISIONAL_1_TO_3   # owner: N_SWEEP = 1-3 bars on sweep timeframe
    evidence_ids: [SWEEP_ID, SWEEP_RECLAIM_ID, LIQUIDITY_ZONE_ID]
    rejection_code: ST-C3-R2   # owner meaning: no external sweep

  # ------------------------------------------------------------
  # 3.2 Displacement + BOS Stage
  # ------------------------------------------------------------
  displacement_bos_stage:
    displacement_definition: impulsive_candles   # owner: "displacement must show impulsive candles"
    displacement_body_ratio_min: CONFIGURABLE_UNRESOLVED   # owner: BOS_MIN_IMPULSE configurable
    bos_confirmation_rule: body_close_required   # owner: "BOS must be a body close, not wick"
    bos_status: provisional_until_first_pullback
    bos_extreme_lock_policy: lock_after_first_pullback   # owner: BOS extreme locking after first pullback
    bos_defines_dealing_range: true   # owner: "BOS defines the dealing range"
    evidence_ids: [DISPLACEMENT_ID, BOS_ID, BOS_EXTREME_ID, DEALING_RANGE_ID]
    rejection_code: ST-C3-R3   # owner meaning: no displacement/BOS

  # ------------------------------------------------------------
  # 3.3 Dealing Range / OTE Stage
  # ------------------------------------------------------------
  ote_stage:
    dealing_range_definition: swing_origin_to_bos_extreme   # owner: "Dealing range = swing origin -> BOS extreme"
    short_only_in_premium: true   # owner
    long_only_in_discount: true   # owner
    equilibrium_boundary: 0.5   # reference: docs/reference/smc-definitive-guide-dailypriceaction.md,
                                 # "Premium and discount zones" (50% of dealing range) — PROVISIONAL
    ote_band_min: 0.62   # reference: docs/reference/smc-definitive-guide-dailypriceaction.md,
                          # "Optimal Trade Entry (OTE)" (62%-79% retracement) — PROVISIONAL
    ote_band_max: 0.79   # reference: same source — PROVISIONAL
    evidence_ids: [OTE_ZONE_ID]
    rejection_code: ST-C3-R4   # owner meaning: no OTE pullback

  # ------------------------------------------------------------
  # 3.4 FVG / Order Block Confluence Stage
  # ------------------------------------------------------------
  fvg_ob_confluence_stage:
    required_zone_types: [fresh_h4_or_m15_fvg, fresh_h4_or_m15_order_block]   # owner
    must_sit_inside_ote: true   # owner: "inside OTE zone"
    freshness_definition: UNRESOLVED   # owner says "fresh" but gives no max-age bar count
    evidence_ids: [FVG_ID, ORDERBLOCK_ID]
    rejection_code: ST-C3-R5   # owner meaning: no FVG/OB confluence

  # ------------------------------------------------------------
  # 3.5 LTF Confirmation Stage (M3)
  # ------------------------------------------------------------
  ltf_confirmation_stage:
    short_confirmation:
      sweep_local_highs_required: true   # owner
      choch_or_bos_direction: down        # owner: "M3 CHoCH/BOS down"
    long_confirmation:
      sweep_local_lows_required: true    # owner
      choch_or_bos_direction: up          # owner: "M3 CHoCH/BOS up"
    zone_context_required: inside_fvg_ob_zone   # owner: "Inside the FVG/OB zone"
    evidence_ids: [LTF_SWEEP_ID, LTF_CHOCH_ID]
    rejection_code: ST-C3-R6   # owner meaning: no LTF CHoCH

  # ------------------------------------------------------------
  # 3.6 Session Gatekeeper Stage
  # ------------------------------------------------------------
  session_gatekeeper_stage:
    allowed_windows: [london_window_utc, ny_window_utc]
    required_for_ltf_confirmation: true
    optional_low_liquidity_filters: true
    evidence_ids: [SESSION_WINDOW_ID]
    rejection_code: ST-C3-R6   # owner: outside session invalidates LTF confirmation

  # ------------------------------------------------------------
  # 3.7 Entry Window Stage
  # ------------------------------------------------------------
  entry_window_stage:
    entry_window_bars: PROVISIONAL_3_TO_5_M3_BARS   # owner example; ratify at S1-G1
    entry_zone_definition: [mf_ltf_fvg, refined_order_block]   # owner
    evidence_ids: [ENTRY_WINDOW_ID, ENTRY_ZONE_ID]
    rejection_code: ST-C3-R7   # owner meaning: entry window expired

  # ------------------------------------------------------------
  # 3.8 Stop-Loss (structural invalidation)
  # ------------------------------------------------------------
  stop_loss_stage:
    mode: structural_invalidation   # owner: "never arbitrary"
    short_anchor: above_m3_swing_that_formed_choch   # owner
    long_anchor: below_m3_swing_that_formed_choch    # owner
    buffer_points: UNRESOLVED   # owner gives no numeric buffer
    evidence_ids: [INVALIDATION_SWING_ID]

  # ------------------------------------------------------------
  # 3.9 Take-Profit Targets
  # ------------------------------------------------------------
  targets_stage:
    tp1_internal_liquidity:
      definition: [prior_swing, internal_liquidity_pocket]   # owner
      rr_min: 3.0   # owner: "TP1 — Internal Liquidity (3R minimum)" / "TP1 = 3R" (stated twice, consistent)
    tp2_external_liquidity:
      definition: [equal_highs_lows, major_liquidity_pool]   # owner
      rr_min: UNRESOLVED   # owner gives no numeric floor for TP2
    tp3_htf_objective:
      definition: [h4_swing, deeper_liquidity_target]   # owner
      rr_min: UNRESOLVED   # owner gives no numeric floor for TP3
    evidence_ids: [TP1_ID, TP2_ID, TP3_ID]

  # ------------------------------------------------------------
  # 3.10 Expiry Logic
  # ------------------------------------------------------------
  expiry_stage:
    triggers:
      - invalidation_breaks   # owner
      - entry_window_closes   # owner
      - htf_bias_flips        # owner
      - new_sweep_and_bos_creates_newer_setup   # owner
    evidence_ids: [EXPIRY_ID]

# ============================================================
# 4. Rejection Codes — ST-C3-namespaced per ADR-0004 to avoid collision
#    with ST-C2's bare R1-R7 (specs/st-c2_v1.2.0.yaml §6, different meanings)
# ============================================================
rejection_codes:
  ST-C3-R1:
    local_code: R1_HTF_BIAS_UNCLEAR
    meaning: htf_bias_unclear
    message: "Rejected: HTF bias not structurally defined."
    stage: htf_bias_stage
    triggers:
      - h4_structure_ambiguous
      - no_clear_hh_hl_or_lh_ll
      - htf_choch_invalidates_bias_mid_stage
    reason: cannot_determine_directional_context
  ST-C3-R2:
    local_code: R2_NO_SWEEP
    meaning: no_valid_sweep
    message: "Rejected: No valid external liquidity sweep."
    stage: liquidity_sweep_stage
    triggers:
      - no_external_liquidity_sweep
      - sweep_wick_does_not_penetrate_level
      - sweep_reclaim_exceeds_n_sweep
    reason: no_institutional_liquidity_event
  ST-C3-R3:
    local_code: R3_NO_DISPLACEMENT_BOS
    meaning: no_displacement_or_bos
    message: "Rejected: No valid displacement or BOS."
    stage: displacement_bos_stage
    triggers:
      - no_impulsive_move_after_sweep
      - bos_no_body_close_break
      - bos_direction_contradicts_htf_bias
    reason: no_momentum_shift
  ST-C3-R4:
    local_code: R4_NO_OTE_PULLBACK
    meaning: no_ote_pullback
    message: "Rejected: Price did not retrace into OTE zone."
    stage: ote_stage
    triggers:
      - price_not_in_62_79_zone
      - bos_extreme_not_locked
      - retrace_outside_ote
    reason: no_optimal_entry_zone
  ST-C3-R5:
    local_code: R5_NO_FVG_OB_CONFLUENCE
    meaning: no_fvg_ob_confluence
    message: "Rejected: No valid FVG/OB confluence."
    stage: fvg_ob_confluence_stage
    triggers:
      - no_fresh_fvg_or_ob_inside_ote
      - confluence_zone_mitigated_or_invalid
      - confluence_contradicts_htf_bias
    reason: no_institutional_footprint
  ST-C3-R6:
    local_code: R6_NO_LTF_CONFIRMATION
    meaning: no_ltf_confirmation
    message: "Rejected: No valid LTF CHoCH/BOS."
    stage: ltf_confirmation_or_session_gatekeeper_stage
    triggers:
      - no_m3_m1_choch_or_bos_inside_confluence
      - no_local_liquidity_sweep
      - choch_outside_allowed_sessions
    reason: no_valid_ltf_reversal
  ST-C3-R7:
    local_code: R7_ENTRY_WINDOW_EXPIRED
    meaning: entry_window_expired
    message: "Rejected: Entry window exceeded MAX_ENTRY_BARS."
    stage: entry_window_stage
    triggers:
      - max_entry_bars_exceeded
      - entry_zone_touched_too_late
      - ltf_choch_too_old_to_confirm
    reason: timing_invalid
  # owner requirement: every rejection carries rejection code, reason,
  # evidence IDs, and the funnel stage where the failure occurred.

termination_codes:
  ST-C3-ERR_HTF_BIAS_FLIP:
    local_code: ERR_HTF_BIAS_FLIP
    meaning: htf_bias_flip_after_signal
    message: "Terminated: HTF structure invalidated."
    stage: expiry_stage
    triggers:
      - h4_bias_flips_after_trade_plan_creation
      - htf_choch_invalidates_directional_context
    reason: macro_structure_changed
  ST-C3-ERR_ENTRY_WINDOW_EXPIRED:
    local_code: ERR_ENTRY_WINDOW_EXPIRED
    meaning: entry_window_expired_after_signal
    message: "Terminated: Entry window closed before execution."
    stage: expiry_stage
    triggers:
      - entry_window_closes_before_execution
      - price_moves_away_from_entry_zone
      - ltf_confirmation_becomes_stale
    reason: trade_timing_invalidated
  ST-C3-ERR_SL_INVALIDATION:
    local_code: ERR_SL_INVALIDATION
    meaning: structural_stop_invalidated
    message: "Terminated: Price breached invalidation swing."
    stage: expiry_stage
    triggers:
      - price_breaks_invalidation_swing
      - sl_level_violated_before_entry
      - structure_invalidates_trade_premise
    reason: setup_structurally_broken
  ST-C3-ERR_SUPERSEDED_SETUP:
    local_code: ERR_SUPERSEDED_SETUP
    meaning: newer_sweep_and_bos_superseded_setup
    message: "Terminated: Newer sweep/BOS setup detected."
    stage: expiry_stage
    triggers:
      - new_sweep_and_bos_appear
      - new_dealing_range_forms
      - new_ote_replaces_old_one
      - new_confluence_zone_emerges
    reason: newer_higher_priority_setup_exists

rejection_code_json_schema:
  R_CODES:
    R1_HTF_BIAS_UNCLEAR: "Rejected: HTF bias not structurally defined."
    R2_NO_SWEEP: "Rejected: No valid external liquidity sweep."
    R3_NO_DISPLACEMENT_BOS: "Rejected: No valid displacement or BOS."
    R4_NO_OTE_PULLBACK: "Rejected: Price did not retrace into OTE zone."
    R5_NO_FVG_OB_CONFLUENCE: "Rejected: No valid FVG/OB confluence."
    R6_NO_LTF_CONFIRMATION: "Rejected: No valid LTF CHoCH/BOS."
    R7_ENTRY_WINDOW_EXPIRED: "Rejected: Entry window exceeded MAX_ENTRY_BARS."
  ERR_CODES:
    ERR_HTF_BIAS_FLIP: "Terminated: HTF structure invalidated."
    ERR_ENTRY_WINDOW_EXPIRED: "Terminated: Entry window closed before execution."
    ERR_SL_INVALIDATION: "Terminated: Price breached invalidation swing."
    ERR_SUPERSEDED_SETUP: "Terminated: Newer sweep/BOS setup detected."

# ============================================================
# 4.0 Evidence Registry — single source of truth for binding
# ============================================================
evidence:
  HTFBiasEvidence:
    tf: H4
    fields: [structure, bias, valid, reason]
  SweepEvidence:
    tf: [H4, M15]
    fields: [sweep_type, wick_penetration, level, valid]
  SweepReclaimEvidence:
    tf: [H4, M15]
    fields: [reclaim_within_bars, max_allowed_bars, reclaimed, valid]
  DisplacementEvidence:
    tf: M15
    fields: [impulse_strength, threshold, valid]
  BOSEvidence:
    tf: M15
    fields: [bos_direction, body_close_break, level, valid]
  BOSExtremeEvidence:
    tf: M15
    fields: [provisional_extreme, locked_extreme, pullback_detected, valid]
  DealingRangeEvidence:
    tf: M15
    fields: [origin, bos_extreme, range_size, valid]
  OTEEvidence:
    tf: M15
    fields: [ote_min, ote_max, price_in_ote, valid]
  FVGEvidence:
    tf: [H4, M15]
    fields: [gap_top, gap_bottom, fresh, inside_ote, valid]
  OrderBlockEvidence:
    tf: [H4, M15]
    fields: [ob_high, ob_low, fresh, inside_ote, valid]
  LTFConfirmationEvidence:
    tf: [M3, M1]
    fields: [choch_direction, sweep_local_liquidity, valid]
  SessionWindowEvidence:
    tf: [M3, M1]
    fields: [session, valid]
  EntryWindowEvidence:
    tf: [M3, M1]
    fields: [bars_since_ltf_choch, max_allowed_bars, inside_window, valid]
  InvalidationSwingEvidence:
    tf: [M3, M1]
    fields: [swing_level, direction, valid]
  TargetEvidence:
    tf: [H4, M15]
    fields: [target_type, level, rr, valid]
  ExpiryEvidence:
    tf: [M3, M1]
    fields: [expiry_reason, valid]

# ============================================================
# 4.1 State Machine — pre-freeze deterministic blueprint
# ============================================================
state_machine:
  states:
    S0: INIT
    S1: HTF_BIAS
    S2: SWEEP
    S3: SWEEP_RECLAIM
    S4: DISPLACEMENT_BOS
    S5: BOS_EXTREME_LOCK
    S6: DEALING_RANGE
    S7: OTE
    S8: FVG_OB_CONFLUENCE
    S9: LTF_CONFIRMATION
    S10: SESSION_GATEKEEPER
    S11: ENTRY_WINDOW
    S12: RISK_SL_TP_BUILD
    S13: TRADE_PLAN_EMIT
    S14: EXPIRY_TERMINATION
    S15: TERMINAL
  transitions:
    - state: S0
      description: INIT
      guard: session_open_and_instrument_enabled
      next: S1
      failure_code: null
    - state: S1
      description: HTF_BIAS
      guard: HTFBiasEvidence.valid == true
      next: S2
      failure_code: R1_HTF_BIAS_UNCLEAR
    - state: S2
      description: SWEEP
      guard: SweepEvidence.valid == true
      next: S3
      failure_code: R2_NO_SWEEP
    - state: S3
      description: SWEEP_RECLAIM
      guard: SweepReclaimEvidence.valid == true AND reclaimed == true
      next: S4
      failure_code: R2_NO_SWEEP
    - state: S4
      description: DISPLACEMENT_BOS
      guard: DisplacementEvidence.valid == true AND BOSEvidence.valid == true
      next: S5
      failure_code: R3_NO_DISPLACEMENT_BOS
    - state: S5
      description: BOS_EXTREME_LOCK
      guard: BOSExtremeEvidence.valid == true AND pullback_detected == true
      next: S6
      failure_code: R3_NO_DISPLACEMENT_BOS
    - state: S6
      description: DEALING_RANGE
      guard: DealingRangeEvidence.valid == true
      next: S7
      failure_code: R4_NO_OTE_PULLBACK
    - state: S7
      description: OTE
      guard: OTEEvidence.valid == true AND price_in_ote == true
      next: S8
      failure_code: R4_NO_OTE_PULLBACK
    - state: S8
      description: FVG_OB_CONFLUENCE
      guard: (FVGEvidence.valid == true OR OrderBlockEvidence.valid == true) AND inside_ote == true
      next: S9
      failure_code: R5_NO_FVG_OB_CONFLUENCE
    - state: S9
      description: LTF_CONFIRMATION
      guard: LTFConfirmationEvidence.valid == true AND sweep_local_liquidity == true
      next: S10
      failure_code: R6_NO_LTF_CONFIRMATION
    - state: S10
      description: SESSION_GATEKEEPER
      guard: SessionWindowEvidence.valid == true AND session IN {LONDON, NY}
      next: S11
      failure_code: R6_NO_LTF_CONFIRMATION
    - state: S11
      description: ENTRY_WINDOW
      guard: EntryWindowEvidence.valid == true AND inside_window == true
      next: S12
      failure_code: R7_ENTRY_WINDOW_EXPIRED
    - state: S12
      description: RISK_SL_TP_BUILD
      guard: InvalidationSwingEvidence.valid == true AND TargetEvidence.valid == true AND computed_rr >= MIN_RR
      next: S13
      failure_code: appropriate_r_code_for_risk_or_target_rule_failure
    - state: S13
      description: TRADE_PLAN_EMIT
      guard: all_prior_states_valid
      next: S14
      failure_code: internal_error_if_build_fails
    - state: S14
      description: EXPIRY_TERMINATION
      guard: monitor_ExpiryEvidence_and_htf_ltf_updates
      next: S15
      termination_codes:
        - ERR_HTF_BIAS_FLIP
        - ERR_ENTRY_WINDOW_EXPIRED
        - ERR_SL_INVALIDATION
        - ERR_SUPERSEDED_SETUP
    - state: S15
      description: TERMINAL
      guard: trade_closed_or_signal_terminated_archive_evidence_and_enums
      next: S0
      failure_code: null
  priority_rules:
    - no_state_can_be_skipped_or_revisited
    - any_failed_guard_triggers_exactly_one_r_code_or_err_code
    - trade_plan_only_exists_if_machine_reaches_s13
    - after_s13_only_err_codes_are_allowed
  evidence_bindings:
    S1_HTF_BIAS:
      consumes: [HTFBiasEvidence]
      produces: [HTFBiasEvidence]
      guard: "HTFBiasEvidence.valid == true"
      reject: R1_HTF_BIAS_UNCLEAR
    S2_SWEEP:
      consumes: [SweepEvidence]
      produces: [SweepEvidence]
      guard: "SweepEvidence.valid == true"
      reject: R2_NO_SWEEP
    S3_SWEEP_RECLAIM:
      consumes: [SweepReclaimEvidence]
      produces: [SweepReclaimEvidence]
      guard: "SweepReclaimEvidence.valid == true and SweepReclaimEvidence.reclaimed == true"
      reject: R2_NO_SWEEP
    S4_DISPLACEMENT_BOS:
      consumes: [DisplacementEvidence, BOSEvidence]
      produces: [DisplacementEvidence, BOSEvidence]
      guard: "DisplacementEvidence.valid == true and BOSEvidence.valid == true"
      reject: R3_NO_DISPLACEMENT_BOS
    S5_BOS_EXTREME_LOCK:
      consumes: [BOSExtremeEvidence]
      produces: [BOSExtremeEvidence]
      guard: "BOSExtremeEvidence.valid == true and BOSExtremeEvidence.pullback_detected == true"
      reject: R3_NO_DISPLACEMENT_BOS
    S6_DEALING_RANGE:
      consumes: [DealingRangeEvidence]
      produces: [DealingRangeEvidence]
      guard: "DealingRangeEvidence.valid == true"
      reject: R4_NO_OTE_PULLBACK
    S7_OTE:
      consumes: [OTEEvidence]
      produces: [OTEEvidence]
      guard: "OTEEvidence.valid == true and OTEEvidence.price_in_ote == true"
      reject: R4_NO_OTE_PULLBACK
    S8_FVG_OB_CONFLUENCE:
      consumes: [FVGEvidence, OrderBlockEvidence]
      produces: [FVGEvidence, OrderBlockEvidence]
      guard: "(FVGEvidence.valid == true or OrderBlockEvidence.valid == true) and inside_ote == true"
      reject: R5_NO_FVG_OB_CONFLUENCE
    S9_LTF_CONFIRMATION:
      consumes: [LTFConfirmationEvidence]
      produces: [LTFConfirmationEvidence]
      guard: "LTFConfirmationEvidence.valid == true and LTFConfirmationEvidence.sweep_local_liquidity == true"
      reject: R6_NO_LTF_CONFIRMATION
    S10_SESSION_GATEKEEPER:
      consumes: [SessionWindowEvidence]
      produces: [SessionWindowEvidence]
      guard: "SessionWindowEvidence.valid == true and SessionWindowEvidence.session in ['LONDON', 'NY']"
      reject: R6_NO_LTF_CONFIRMATION
    S11_ENTRY_WINDOW:
      consumes: [EntryWindowEvidence]
      produces: [EntryWindowEvidence]
      guard: "EntryWindowEvidence.valid == true and EntryWindowEvidence.inside_window == true"
      reject: R7_ENTRY_WINDOW_EXPIRED
    S12_RISK_SLTP:
      consumes: [InvalidationSwingEvidence, TargetEvidence]
      produces: [InvalidationSwingEvidence, TargetEvidence]
      guard: "InvalidationSwingEvidence.valid == true and TargetEvidence.valid == true and computed_rr >= MIN_RR"
      reject: R5_NO_FVG_OB_CONFLUENCE
    S13_TRADE_PLAN_EMIT:
      consumes:
        - HTFBiasEvidence
        - SweepEvidence
        - SweepReclaimEvidence
        - DisplacementEvidence
        - BOSEvidence
        - BOSExtremeEvidence
        - DealingRangeEvidence
        - OTEEvidence
        - FVGEvidence
        - OrderBlockEvidence
        - LTFConfirmationEvidence
        - SessionWindowEvidence
        - EntryWindowEvidence
        - InvalidationSwingEvidence
        - TargetEvidence
      produces: [TRADE_PLAN]
      guard: all_previous_states_valid
      reject: none
    S14_EXPIRY:
      consumes: [ExpiryEvidence]
      produces: [ExpiryEvidence]
      terminate:
        - ERR_HTF_BIAS_FLIP
        - ERR_ENTRY_WINDOW_EXPIRED
        - ERR_SL_INVALIDATION
        - ERR_SUPERSEDED_SETUP

validator_rules:
  evaluation_model:
    statefulness: stateless_per_tick_stateful_per_setup
    guard_policy: one_guard_per_state
    failure_policy: exactly_one_code_per_failed_guard
    post_trade_plan_policy: after_s13_only_err_codes_allowed
  principles:
    deterministic_evaluation:
      - every_state_has_one_guard
      - guard_failure_emits_exactly_one_r_code
      - after_s13_only_err_codes_are_allowed
    evidence_driven:
      - validator_never_computes_structure
      - validator_only_checks_evidence_valid_and_evidence_fields
      - detection_modules_produce_evidence
    no_discretion:
      - no_fuzzy_logic
      - no_probability_thresholds
      - no_confidence_scores
      - only_boolean_guards_and_numeric_comparisons
  state_rules:
    S1_HTF_BIAS:
      guard: "HTFBiasEvidence.valid == true"
      reject: R1_HTF_BIAS_UNCLEAR
    S2_SWEEP:
      guard: "SweepEvidence.valid == true"
      reject: R2_NO_SWEEP
    S3_SWEEP_RECLAIM:
      guard: "SweepReclaimEvidence.valid == true AND SweepReclaimEvidence.reclaimed == true"
      reject: R2_NO_SWEEP
    S4_DISPLACEMENT_BOS:
      guard: "DisplacementEvidence.valid == true AND BOSEvidence.valid == true"
      reject: R3_NO_DISPLACEMENT_BOS
    S5_BOS_EXTREME_LOCK:
      guard: "BOSExtremeEvidence.valid == true AND BOSExtremeEvidence.pullback_detected == true"
      reject: R3_NO_DISPLACEMENT_BOS
    S6_DEALING_RANGE:
      guard: "DealingRangeEvidence.valid == true"
      reject: R4_NO_OTE_PULLBACK
    S7_OTE:
      guard: "OTEEvidence.valid == true AND OTEEvidence.price_in_ote == true"
      reject: R4_NO_OTE_PULLBACK
    S8_FVG_OB_CONFLUENCE:
      guard: "(FVGEvidence.valid == true OR OrderBlockEvidence.valid == true) AND inside_ote == true"
      reject: R5_NO_FVG_OB_CONFLUENCE
    S9_LTF_CONFIRMATION:
      guard: "LTFConfirmationEvidence.valid == true AND LTFConfirmationEvidence.sweep_local_liquidity == true"
      reject: R6_NO_LTF_CONFIRMATION
    S10_SESSION_GATEKEEPER:
      guard: "SessionWindowEvidence.valid == true AND SessionWindowEvidence.session IN ['LONDON', 'NY']"
      reject: R6_NO_LTF_CONFIRMATION
    S11_ENTRY_WINDOW:
      guard: "EntryWindowEvidence.valid == true AND EntryWindowEvidence.inside_window == true"
      reject: R7_ENTRY_WINDOW_EXPIRED
    S12_RISK_SLTP:
      guard: "InvalidationSwingEvidence.valid == true AND TargetEvidence.valid == true AND computed_rr >= MIN_RR"
      reject: R5_NO_FVG_OB_CONFLUENCE
    S13_TRADE_PLAN_EMIT:
      guard: all_previous_states_valid
      output: TRADE_PLAN
      reject: none
  expiry_termination_map:
    BIAS_FLIP: ERR_HTF_BIAS_FLIP
    ENTRY_WINDOW: ERR_ENTRY_WINDOW_EXPIRED
    SL_BREAK: ERR_SL_INVALIDATION
    SUPERSEDED: ERR_SUPERSEDED_SETUP
  execution_flow:
    on_every_tick:
      - load_current_state
      - load_evidence_for_current_state
      - evaluate_guard
      - if_guard_fails_emit_r_code_and_stop
      - if_guard_passes_advance_to_next_state
      - if_state_is_s13_emit_trade_plan
      - if_state_greater_than_or_equal_s13_check_expiry_and_emit_err_code_if_needed
    state_advancement:
      - forward_only
      - no_backward_transitions
      - no_skipping_states
      - no_reentry_into_previous_states
  outputs:
    rejection:
      state: REJECTED
      code: R#_XXXX
      reason: string
      evidence_id: evidence.id
    termination:
      state: TERMINATED
      code: ERR_XXXX
      reason: string
      trade_plan_id: TP.id
    valid:
      state: VALID
      trade_plan: TRADE_PLAN

# ============================================================
# 4.2 Evidence Object Schema — pre-freeze draft contract
# ============================================================
evidence_object_schema:
  universal_required_fields:
    id: str
    tf: timeframe
    valid: bool
    reason: str
    timestamp: bar_time
    provenance: STC3_v1
  object_types:
    HTFBiasEvidence:
      tf: [H4]
      fields:
        structure: [HHHL, LHLL, UNCLEAR]
        bias: [BULLISH, BEARISH, NONE]
    SweepEvidence:
      tf: [H4, M15]
      fields:
        sweep_type: [BUY_SIDE, SELL_SIDE]
        wick_penetration: bool
        level: float
    SweepReclaimEvidence:
      tf: [H4, M15]
      fields:
        reclaim_within_bars: int
        max_allowed_bars: int
        reclaimed: bool
    DisplacementEvidence:
      tf: [M15]
      fields:
        impulse_strength: float
        threshold: float
    BOSEvidence:
      tf: [M15]
      fields:
        bos_direction: [UP, DOWN]
        body_close_break: bool
        level: float
    BOSExtremeEvidence:
      tf: [M15]
      fields:
        provisional_extreme: float
        locked_extreme: float
        pullback_detected: bool
    DealingRangeEvidence:
      tf: [M15]
      fields:
        origin: float
        bos_extreme: float
        range_size: float
    OTEEvidence:
      tf: [M15]
      fields:
        ote_min: float
        ote_max: float
        price_in_ote: bool
    FVGEvidence:
      tf: [H4, M15]
      fields:
        gap_top: float
        gap_bottom: float
        fresh: bool
        inside_ote: bool
    OrderBlockEvidence:
      tf: [H4, M15]
      fields:
        ob_high: float
        ob_low: float
        fresh: bool
        inside_ote: bool
    LTFConfirmationEvidence:
      tf: [M3, M1]
      fields:
        choch_direction: [UP, DOWN]
        sweep_local_liquidity: bool
    SessionWindowEvidence:
      tf: [M3, M1]
      fields:
        session: [LONDON, NY, INVALID]
    EntryWindowEvidence:
      tf: [M3, M1]
      fields:
        bars_since_ltf_choch: int
        max_allowed_bars: int
        inside_window: bool
    InvalidationSwingEvidence:
      tf: [M3, M1]
      fields:
        swing_level: float
        direction: [LONG, SHORT]
    TargetEvidence:
      tf: [H4, M15]
      fields:
        target_type: [TP1_INTERNAL, TP2_EXTERNAL, TP3_HTF]
        level: float
        rr: float
    ExpiryEvidence:
      tf: [M3, M1]
      fields:
        expiry_reason: [BIAS_FLIP, ENTRY_WINDOW, SL_BREAK, SUPERSEDED]
        valid: false

# ============================================================
# 5. Trade-Plan Object Schema (machine format emitted at S13)
# ============================================================
trade_plan:
  strategy_id: ST-C3
  schema:
    direction:
      type: enum
      values: [LONG, SHORT]
      evidence: HTFBiasEvidence.bias
    context:
      htf_bias_id: HTFBiasEvidence.id
      sweep_id: SweepEvidence.id
      sweep_reclaim_id: SweepReclaimEvidence.id
      bos_id: BOSEvidence.id
      bos_extreme_id: BOSExtremeEvidence.id
      dealing_range_id: DealingRangeEvidence.id
      ote_id: OTEEvidence.id
      fvg_id: FVGEvidence.id
      orderblock_id: OrderBlockEvidence.id
      ltf_confirmation_id: LTFConfirmationEvidence.id
      session_window_id: SessionWindowEvidence.id
    entry:
      entry_zone_type:
        type: enum
        values: [FVG, ORDERBLOCK]
        evidence: [FVGEvidence.valid, OrderBlockEvidence.valid]
      entry_zone_id:
        type: string
        evidence: [FVGEvidence.id, OrderBlockEvidence.id]
      entry_price:
        type: float
      entry_window_id: EntryWindowEvidence.id
      max_entry_bars: EntryWindowEvidence.max_allowed_bars
      bars_since_ltf_choch: EntryWindowEvidence.bars_since_ltf_choch
    risk:
      sl_price:
        type: float
        evidence: InvalidationSwingEvidence.swing_level
      sl_type: STRUCTURAL_INVALIDATION
      risk_per_trade_pct:
        type: float
      min_rr_required:
        type: float
      computed_rr:
        type: float
    targets:
      tp1:
        target_id: TargetEvidence.id
        target_type: TP1_INTERNAL
        price: TargetEvidence.level
        rr: TargetEvidence.rr
      tp2:
        target_id: TargetEvidence.id
        target_type: TP2_EXTERNAL
        price: TargetEvidence.level
        rr: TargetEvidence.rr
      tp3:
        target_id: TargetEvidence.id
        target_type: TP3_HTF
        price: TargetEvidence.level
        rr: TargetEvidence.rr
    expiry:
      rules: [BIAS_FLIP, ENTRY_WINDOW, SL_BREAK, SUPERSEDED]
      expiry_evidence_id: ExpiryEvidence.id
    evidence_chain:
      - HTFBiasEvidence.id
      - SweepEvidence.id
      - SweepReclaimEvidence.id
      - DisplacementEvidence.id
      - BOSEvidence.id
      - BOSExtremeEvidence.id
      - DealingRangeEvidence.id
      - OTEEvidence.id
      - FVGEvidence.id
      - OrderBlockEvidence.id
      - LTFConfirmationEvidence.id
      - SessionWindowEvidence.id
      - EntryWindowEvidence.id
      - InvalidationSwingEvidence.id
      - TargetEvidence.id
    status:
      state:
        type: enum
        values: [VALID, REJECTED, TERMINATED]
      code:
        type: enum
        values:
          - R1_HTF_BIAS_UNCLEAR
          - R2_NO_SWEEP
          - R3_NO_DISPLACEMENT_BOS
          - R4_NO_OTE_PULLBACK
          - R5_NO_FVG_OB_CONFLUENCE
          - R6_NO_LTF_CONFIRMATION
          - R7_ENTRY_WINDOW_EXPIRED
          - ERR_HTF_BIAS_FLIP
          - ERR_ENTRY_WINDOW_EXPIRED
          - ERR_SL_INVALIDATION
          - ERR_SUPERSEDED_SETUP
      reason:
        type: string
    meta:
      created_at:
        type: datetime
      tf_stack:
        type: list
        values: [H4, M15, M3, M1]
      session:
        type: enum
        values: [LONDON, NY]
      provenance: STC3_v1

# ============================================================
# 5.1 Execution Agent — proposed Stage B consumer, no authority
# ============================================================
execution_agent:
  id: EXECUTION_AGENT_STC3
  role: Execute validated ST-C3 trade-plans
  mode: deterministic_rule_based_session_aware
  authorization: blocked_until_stage_b
  inputs: [TRADE_PLAN]
  outputs:
    - execution_events
    - order_placement
    - lifecycle_logs
  responsibilities:
    - consume_validated_trade_plan_objects
    - enforce_session_rules
    - enforce_expiry_rules
    - place_orders_only_inside_entry_zone
    - respect_sl_tp_levels
    - track_rr_partial_exits_and_liquidity_targets
    - emit_execution_logs_for_governance
    - terminate_trades_using_err_codes
    - never_override_validator_decisions
    - never_modify_evidence
    - never_modify_trade_plan_structure
    - never_reinterpret_structure
  preconditions:
    - TRADE_PLAN.status.state == "VALID"
    - current_session IN ["LONDON", "NY"]
    - price_inside_TRADE_PLAN.entry.entry_zone
  entry_logic:
    zone_type: TRADE_PLAN.entry.entry_zone_type
    zone_id: TRADE_PLAN.entry.entry_zone_id
    entry_price: TRADE_PLAN.entry.entry_price
    max_entry_bars: TRADE_PLAN.entry.max_entry_bars
    supported_zone_types: [FVG, ORDERBLOCK, HYBRID_OB_INSIDE_FVG]
  order:
    type: [MARKET, LIMIT]
    trade_plan_id: TRADE_PLAN.id
    entry_price: TRADE_PLAN.entry.entry_price
    sl: TRADE_PLAN.risk.sl_price
    tp1: TRADE_PLAN.targets.tp1.price
    tp2: TRADE_PLAN.targets.tp2.price
    tp3: TRADE_PLAN.targets.tp3.price
    risk_pct: TRADE_PLAN.risk.risk_per_trade_pct
  expiry_rules: [BIAS_FLIP, ENTRY_WINDOW, SL_BREAK, SUPERSEDED]
  termination_codes:
    BIAS_FLIP: ERR_HTF_BIAS_FLIP
    ENTRY_WINDOW: ERR_ENTRY_WINDOW_EXPIRED
    SL_BREAK: ERR_SL_INVALIDATION
    SUPERSEDED: ERR_SUPERSEDED_SETUP
  partial_exits:
    tp1: 0.30
    tp2: 0.30
    tp3: 0.40
  events:
    execution:
      - EXEC_ENTER
      - EXEC_EXIT_TP1
      - EXEC_EXIT_TP2
      - EXEC_EXIT_TP3
      - EXEC_SL_HIT
      - EXEC_EXPIRED
      - EXEC_TERMINATED
      - EXEC_COMPLETED
    termination:
      - ERR_HTF_BIAS_FLIP
      - ERR_ENTRY_WINDOW_EXPIRED
      - ERR_SL_INVALIDATION
      - ERR_SUPERSEDED_SETUP
  completion:
    on_tp3_hit:
      state: COMPLETED
      emits:
        - final_rr
        - final_liquidity_targets_hit
        - full_evidence_chain
        - execution_log

# ============================================================
# 6. Risk & Portfolio — UNRESOLVED (not carried over from ST-C2; new
#    lineage per ADR-0004, must be independently decided at S1-G1)
# ============================================================
risk:
  per_trade_risk_pct: UNRESOLVED
  min_rr: CONFIGURABLE_PROVISIONAL_3R   # owner example; ratify at S1-G1
  max_positions: UNRESOLVED
  portfolio_heat_pct: UNRESOLVED
  daily_loss_pct: UNRESOLVED
  weekly_loss_pct: UNRESOLVED

# ============================================================
# 7. Conformance & Diagnostics
# ============================================================
conformance:
  require_all_stages_pass: true   # owner: "If any stage fails, reject the signal using the correct rejection code"
  log_level: info

diagnostics:
  enable_audit_logs: true
  record_rejected_setups: true   # owner: every rejection must include code, reason, evidence IDs, stage

# ============================================================
# 8. RCR Pre-Registration
# ============================================================
rcr_preregistration:
  research_log_entry: "ST-C3 v1.0.0 candidate intake — Daily Price Action funnel, reports/research_log.md, 2026-07-24"
  primary_metric: UNRESOLVED   # deferred to S1-G1
  secondary_metrics: UNRESOLVED
  existence_check_floor: UNRESOLVED
  population_feasibility_floor: UNRESOLVED
  statistical_claim_floor: UNRESOLVED

# ============================================================
