strategy:
  id: ST-C2
  version: 1.2.0
  symbol: GBPUSD
  spec: specs/st-c2_v1.2.0.yaml
  stage: A2 - Indicator, Event and Signal Conformance

acceptance:
  primitive_exact_match_rate: 1.0
  critical_event_match_rate: 1.0
  signal_direction_match_rate: 1.0
  signal_timestamp_match_rate: 1.0
  entry_price_match_rate: 1.0
  stop_loss_match_rate: 1.0
  take_profit_match_rate: 1.0
  duplicate_signals: 0
  illegal_state_transitions: 0
  lookahead_violations: 0
  unexplained_differences: 0
  missing_rule_test_mappings: 37
  audit_source: reports/validation/st_c2/A2_RULE_COVERAGE_MATRIX.json
  s1_g2_completion_eligible: false

rules:
  STC2-SCOPE-001:
    description: Active ST-C2 v1.2.0 scope is frozen to GBPUSD only.
    implementation:
      module: validation.st_c2_reference
      function: enabled_symbols
    tests:
      - tests/test_st_c2_reference.py::test_spec_is_frozen_gbpusd_only
    golden_cases:
      - GC-STC2-GBPUSD-CONFIG-001
    expected_rejection_behavior:
      code: R6
      condition: enabled symbol set differs from active GBPUSD-only scope

  STC2-TF-001:
    description: HTF/MF/LTF timeframes are H4/M15/M3.
    implementation:
      module: validation.st_c2_reference
      function: data_availability
    tests: []
    golden_cases:
      - GC-STC2-GBPUSD-CONFIG-001
    expected_rejection_behavior:
      code: DATA_MISSING
      condition: one or more required timeframe files are absent
    mapping_status: mapped_not_tested

  STC2-STRUCT-001:
    description: H4 swing structure uses the frozen fractal definition and closed candles only.
    implementation:
      module: validation.st_c2.structure
      function: detect_htf_structure
    tests:
      - tests/test_st_c2_reference.py::test_cutoff_invariance_when_future_bars_excluded
      - tests/st_c2/test_structural_conformance.py::test_htf_bias_uses_closed_candle_bos_choch_not_wick_only
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
      - GC-STC2-GBPUSD-BEAR-POS-001
    expected_rejection_behavior:
      code: R2
      condition: no close-confirmed HTF structural bias exists

  STC2-STRUCT-004:
    description: Protected levels are created by structural bias evidence and represented with stable IDs.
    implementation:
      module: validation.st_c2.structure
      function: detect_htf_structure
    tests:
      - tests/st_c2/test_structural_conformance.py::test_htf_bias_uses_closed_candle_bos_choch_not_wick_only
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R2
      condition: no structural bias event exists to create a protected level
    mapping_status: implemented

  STC2-STRUCT-005:
    description: Opposite CHoCH invalidates prior protected-level authority.
    implementation:
      module: validation.st_c2.structure
      function: detect_htf_structure
    tests:
      - tests/st_c2/test_structural_conformance.py::test_choch_flip_requires_displacement_threshold
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R2
      condition: opposite CHoCH attempt lacks required displacement
    mapping_status: implemented

  STC2-BIAS-001:
    description: Bull/bear HTF bias classification uses only HTF BOS/CHoCH evidence.
    implementation:
      module: validation.st_c2.structure
      function: classify_htf_bias
    tests:
      - tests/st_c2/test_structural_conformance.py::test_htf_bias_uses_closed_candle_bos_choch_not_wick_only
      - tests/st_c2/test_structural_conformance.py::test_choch_flip_requires_displacement_threshold
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
      - GC-STC2-GBPUSD-BEAR-POS-001
    expected_rejection_behavior:
      code: R2
      condition: no BOS/CHoCH structural event exists
    mapping_status: implemented

  STC2-BIAS-002:
    description: Every HTF bias decision records bias evidence timestamp, event ID, and evidence type.
    implementation:
      module: validation.st_c2.structure
      function: classify_htf_bias
    tests:
      - tests/st_c2/test_structural_conformance.py::test_htf_bias_uses_closed_candle_bos_choch_not_wick_only
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R2
      condition: missing structural evidence leaves bias_evidence_timestamp null
    mapping_status: implemented

  STC2-BIAS-003:
    description: HTF BOS requires closed-candle break beyond confirmed structure.
    implementation:
      module: validation.st_c2.structure
      function: detect_htf_structure
    tests:
      - tests/st_c2/test_structural_conformance.py::test_htf_bias_uses_closed_candle_bos_choch_not_wick_only
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R2
      condition: wick-only break does not create BOS
    mapping_status: implemented

  STC2-BIAS-004:
    description: HTF CHoCH requires frozen displacement body-ratio threshold before bias flip.
    implementation:
      module: validation.st_c2.structure
      function: detect_htf_structure
    tests:
      - tests/st_c2/test_structural_conformance.py::test_choch_flip_requires_displacement_threshold
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R2
      condition: CHoCH attempt displacement is below frozen threshold
    mapping_status: implemented

  STC2-BIAS-005:
    description: BOS/CHoCH classification is mutually exclusive and governed by prior confirmed HTF bias.
    implementation:
      module: validation.st_c2.structure
      function: detect_htf_structure
    tests:
      - tests/st_c2/test_structural_conformance.py::test_htf_bias_uses_closed_candle_bos_choch_not_wick_only
      - tests/st_c2/test_structural_conformance.py::test_choch_flip_requires_displacement_threshold
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R2
      condition: structural event is absent or rejected before bias authority changes
    mapping_status: implemented

  STC2-LIQ-003:
    description: Eligible H4 liquidity sweep must reclaim with the frozen wick-ratio and max-age rule.
    implementation:
      module: validation.st_c2.structure
      function: detect_sweep_and_reclaim
    tests:
      - tests/test_st_c2_reference.py::test_positive_golden_case_emits_signal
      - tests/test_st_c2_reference.py::test_negative_without_liquidity_rejects_r1
      - tests/st_c2/test_structural_conformance.py::test_sweep_requires_pierce_reclaim_wick_ratio_and_age
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
      - GC-STC2-GBPUSD-LIQ-NEG-001
    expected_rejection_behavior:
      code: R1
      condition: liquidity sweep is absent or older than max_sweep_age_bars_htf

  STC2-LIQ-005:
    description: Eligible liquidity sweep must be within max_sweep_age_bars_htf.
    implementation:
      module: validation.st_c2_reference
      function: _last_sweep
    tests: []
    golden_cases:
      - GC-STC2-GBPUSD-LIQ-NEG-001
    expected_rejection_behavior:
      code: R1
      condition: liquidity sweep exists but is older than max_sweep_age_bars_htf
    mapping_status: mapped_not_tested

  STC2-LIQ-007:
    description: Liquidity pool selection uses direction, nearest price, recent confirmation, and stable identifier tie-breaks.
    implementation:
      module: validation.st_c2.structure
      function: select_liquidity_pool
    tests:
      - tests/st_c2/test_structural_conformance.py::test_liquidity_pool_selection_is_stable_and_directional
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R1
      condition: no eligible directional liquidity pool is available
    mapping_status: implemented

  STC2-OTE-002:
    description: Long setups require discount and short setups require premium relative to the MF dealing range.
    implementation:
      module: validation.st_c2.structure
      function: evaluate_ote_location
    tests:
      - tests/test_st_c2_reference.py::test_positive_golden_case_emits_signal
      - tests/test_st_c2_reference.py::test_bearish_mirror_emits_short_signal
      - tests/st_c2/test_structural_conformance.py::test_structural_dealing_range_ote_boundaries_are_deterministic
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
      - GC-STC2-GBPUSD-BEAR-POS-001
    expected_rejection_behavior:
      code: R3
      condition: candidate closes on the wrong side of equilibrium

  STC2-OTE-003:
    description: OTE max retrace is 0.786 with exact boundary handling.
    implementation:
      module: validation.st_c2.structure
      function: evaluate_ote_location
    tests:
      - tests/st_c2/test_structural_conformance.py::test_structural_dealing_range_ote_boundaries_are_deterministic
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
      - GC-STC2-GBPUSD-BEAR-POS-001
    expected_rejection_behavior:
      code: R3
      condition: candidate is outside the frozen OTE retrace band
    mapping_status: implemented

  STC2-FVG-006:
    description: FVG alignment uses fixed three-candle wick-to-wick geometry in the setup direction.
    implementation:
      module: validation.st_c2_reference
      function: _matching_mf_fvg
    tests:
      - tests/test_st_c2_reference.py::test_positive_golden_case_emits_signal
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
    expected_rejection_behavior:
      code: R4
      condition: no matching MF FVG exists

  STC2-LTF-002:
    description: LTF confirmation requires a close beyond prior swing structure.
    implementation:
      module: validation.st_c2_reference
      function: _ltf_confirmation
    tests:
      - tests/test_st_c2_reference.py::test_positive_golden_case_emits_signal
      - tests/test_st_c2_reference.py::test_bearish_mirror_emits_short_signal
    golden_cases:
      - GC-STC2-GBPUSD-BULL-POS-001
      - GC-STC2-GBPUSD-BEAR-POS-001
    expected_rejection_behavior:
      code: R5
      condition: no close-confirmed LTF break exists
